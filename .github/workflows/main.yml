name: ARM64 Android 16 AVD on macOS + ws-scrcpy + Cloudflare

on:
  workflow_dispatch:        # manual trigger

jobs:
  mac-emulator:
    runs-on: macos-14       # Apple Silicon (M1) runner
    timeout-minutes: 360    # max for public repos (6h)

    env:
      ANDROID_SDK_ROOT: /usr/local/share/android-sdk
      AVD_NAME: test_avd
      API_LEVEL: 36         # Android 16 (preview)

    steps:
      - name: Install Java (required for Android tools)
        run: brew install openjdk@17
      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=$(brew --prefix openjdk@17)" >> $GITHUB_ENV

      - name: Download Android Command Line Tools
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          curl -L https://dl.google.com/android/repository/commandlinetools-mac-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses

      - name: Install platform-tools, emulator and ARM64 system image
        run: |
          sdkmanager "platform-tools" "emulator" "platforms;android-$API_LEVEL"
          # Try Android 16 ARM64 image; fallback to Android 15 if not yet available
          IMG="system-images;android-$API_LEVEL;google_apis;arm64-v8a"
          if ! sdkmanager --list | grep -q "$IMG"; then
            echo "Android $API_LEVEL ARM64 image not found. Falling back to API 35."
            API_LEVEL=35
            IMG="system-images;android-$API_LEVEL;google_apis;arm64-v8a"
            echo "API_LEVEL=$API_LEVEL" >> $GITHUB_ENV
          fi
          sdkmanager "$IMG"

      - name: Create AVD
        run: |
          DEVICE="pixel_6"   # ARM64 compatible device definition
          avdmanager create avd \
            -n $AVD_NAME \
            -k "system-images;android-$API_LEVEL;google_apis;arm64-v8a" \
            -d "$DEVICE" \
            -f
          # Configure for headless CI
          echo "hw.keyboard=yes" >> ~/.android/avd/$AVD_NAME.avd/config.ini
          echo "hw.ramSize=2048" >> ~/.android/avd/$AVD_NAME.avd/config.ini
          echo "disk.dataPartition.size=4096M" >> ~/.android/avd/$AVD_NAME.avd/config.ini
          # Enable hardware acceleration via Hypervisor.framework
          echo "hw.cpu.ncore=4" >> ~/.android/avd/$AVD_NAME.avd/config.ini
          echo "hw.gpu.mode=host" >> ~/.android/avd/$AVD_NAME.avd/config.ini

      - name: Start Emulator with Hypervisor acceleration
        run: |
          $ANDROID_SDK_ROOT/emulator/emulator \
            -avd $AVD_NAME \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -netdelay none \
            -netspeed full \
            -accel on \
            -gpu swiftshader_indirect \
            -verbose > emulator.log 2>&1 &
          echo "Waiting for device..."
          adb wait-for-device
          while [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" != "1" ]; do
            echo "Boot not yet complete... checking again in 5s"
            sleep 5
          done
          echo "Emulator booted successfully!"

      - name: Set up Node.js (for ws-scrcpy)
        run: |
          brew install node@20
          echo "$(brew --prefix node@20)/bin" >> $GITHUB_PATH

      - name: Clone and install ws-scrcpy
        run: |
          git clone https://github.com/NetrisTV/ws-scrcpy.git
          cd ws-scrcpy
          npm install

      - name: Install Cloudflare Tunnel client (ARM64 macOS)
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-arm64 -o cloudflared
          chmod +x cloudflared

      - name: Start Cloudflare Tunnel and ws-scrcpy
        run: |
          # Start tunnel in background, capturing the trycloudflare URL
          nohup ./cloudflared tunnel --url http://localhost:8000 > tunnel.log 2>&1 &
          sleep 5
          # Extract the URL
          TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' tunnel.log | head -1)
          # Retry a few times if needed
          for i in {1..5}; do
            if [ -n "$TUNNEL_URL" ]; then break; fi
            sleep 5
            TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' tunnel.log | head -1)
          done
          echo "🌐 Access your Android emulator at: $TUNNEL_URL"
          echo "Access URL: $TUNNEL_URL" >> $GITHUB_STEP_SUMMARY
          # Keep workflow alive by running ws-scrcpy in foreground
          cd ws-scrcpy
          npm start
