name: ARM64 Android AVD (stable 15) + ws-scrcpy + Cloudflare

on:
  workflow_dispatch:

jobs:
  emulator:
    runs-on: macos-14           # Apple Silicon
    timeout-minutes: 360

    env:
      ANDROID_SDK_ROOT: /usr/local/share/android-sdk
      AVD_NAME: test_avd
      API_LEVEL: 35
      IMG_TAG: google_apis
      ABI: arm64-v8a

    steps:
      - name: Install Java
        run: brew install openjdk@17
      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=$(brew --prefix openjdk@17)" >> $GITHUB_ENV

      - name: Download Android Command Line Tools
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          curl -L https://dl.google.com/android/repository/commandlinetools-mac-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Accept SDK Licenses
        run: yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses

      - name: Install SDK packages (explicit SDK root)
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" "emulator" "platforms;android-$API_LEVEL" \
            "system-images;android-$API_LEVEL;$IMG_TAG;$ABI"

      - name: Create AVD and fix system image path
        run: |
          avdmanager --sdk_root=$ANDROID_SDK_ROOT create avd \
            -n $AVD_NAME \
            -k "system-images;android-$API_LEVEL;$IMG_TAG;$ABI" \
            -d "pixel_6" -f

          # Patch config.ini to use the correct absolute image path
          AVD_PATH="$HOME/.android/avd/$AVD_NAME.avd"
          IMAGE_PATH="$ANDROID_SDK_ROOT/system-images/android-$API_LEVEL/$IMG_TAG/$ABI"
          if grep -q '^image.sysdir.1=' "$AVD_PATH/config.ini"; then
            sed -i '' "s|^image.sysdir.1=.*|image.sysdir.1=$IMAGE_PATH|" "$AVD_PATH/config.ini"
          else
            echo "image.sysdir.1=$IMAGE_PATH" >> "$AVD_PATH/config.ini"
          fi

          # Additional headless settings
          echo "hw.keyboard=yes" >> "$AVD_PATH/config.ini"
          echo "hw.ramSize=2048" >> "$AVD_PATH/config.ini"
          echo "disk.dataPartition.size=4096M" >> "$AVD_PATH/config.ini"
          echo "hw.cpu.ncore=4" >> "$AVD_PATH/config.ini"

      - name: Boot emulator with live logs and retry
        run: |
          MAX_RETRIES=2
          retry=0
          success=false

          while [ $retry -lt $MAX_RETRIES ] && [ "$success" = false ]; do
            echo "===== Boot attempt $((retry+1))/$MAX_RETRIES ====="
            adb -s emulator-5554 emu kill 2>/dev/null || true
            sleep 2

            $ANDROID_SDK_ROOT/emulator/emulator \
              -avd $AVD_NAME \
              -no-window \
              -no-audio \
              -no-boot-anim \
              -netdelay none \
              -netspeed full \
              -accel on \
              -verbose \
              -no-snapshot \
              &> emulator_boot.log &
            EMU_PID=$!

            tail -f emulator_boot.log &
            TAIL_PID=$!

            timeout=900
            start=$SECONDS
            booted=false

            while [ $((SECONDS - start)) -lt $timeout ]; do
              if adb devices | grep -q 'emulator-5554'; then
                boot_status=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
                if [ "$boot_status" = "1" ]; then
                  booted=true
                  break
                fi
              fi
              sleep 5
            done

            kill $TAIL_PID 2>/dev/null || true

            if [ "$booted" = true ]; then
              success=true
              echo "✅ Emulator booted successfully!"
            else
              echo "❌ Boot timed out after $timeout seconds."
              tail -n 100 emulator_boot.log
              kill $EMU_PID 2>/dev/null || true
              retry=$((retry+1))
            fi
          done

          if [ "$success" = false ]; then
            echo "::error::Emulator failed to boot after $MAX_RETRIES attempts."
            exit 1
          fi

      - name: Set up Node.js
        run: |
          brew install node@20
          echo "$(brew --prefix node@20)/bin" >> $GITHUB_PATH

      - name: Clone and install ws-scrcpy
        run: |
          git clone https://github.com/NetrisTV/ws-scrcpy.git
          cd ws-scrcpy
          npm install

      - name: Download Cloudflared (ARM64 macOS)
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-arm64 -o cloudflared
          chmod +x cloudflared

      - name: Expose emulator via Cloudflare Tunnel
        run: |
          nohup ./cloudflared tunnel --url http://localhost:8000 > tunnel.log 2>&1 &
          sleep 5
          TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' tunnel.log | head -1)
          for i in {1..10}; do
            [ -n "$TUNNEL_URL" ] && break
            sleep 5
            TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' tunnel.log | head -1)
          done
          echo "🌐 Access URL: $TUNNEL_URL"
          echo "Access URL: $TUNNEL_URL" >> $GITHUB_STEP_SUMMARY
          cd ws-scrcpy
          npm start
