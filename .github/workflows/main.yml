name: ARM64 Android AVD + ws-scrcpy + Cloudflare Tunnel

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: macos-14
    timeout-minutes: 360

    env:
      ANDROID_SDK_ROOT: /usr/local/share/android-sdk
      AVD_NAME: test_avd
      # Will try Android 16 (API 36) first, fallback to 15 if image not yet available
      API_LEVEL: 36
      IMG_TAG: google_apis
      ABI: arm64-v8a

    steps:
      - name: Setup Java
        run: |
          brew install openjdk@17
          echo "JAVA_HOME=$(brew --prefix openjdk@17)" >> $GITHUB_ENV

      - name: Install Android command-line tools
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          curl -L https://dl.google.com/android/repository/commandlinetools-mac-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Accept SDK licenses
        run: yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses

      - name: Pre‑install correct ARM64 system image
        run: |
          IMG="system-images;android-${API_LEVEL};${IMG_TAG};${ABI}"
          if sdkmanager --sdk_root=$ANDROID_SDK_ROOT --list | grep -q "$IMG"; then
            echo "Using Android ${API_LEVEL} ARM64 image"
            sdkmanager --sdk_root=$ANDROID_SDK_ROOT "$IMG" "platforms;android-${API_LEVEL}"
          else
            echo "Android ${API_LEVEL} image not found, falling back to API 35"
            echo "API_LEVEL=35" >> $GITHUB_ENV
            sdkmanager --sdk_root=$ANDROID_SDK_ROOT "system-images;android-35;${IMG_TAG};${ABI}" "platforms;android-35"
          fi

      - name: Boot emulator (software rendering, no HVF)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          arch: arm64-v8a
          target: google_apis
          force-avd-creation: true
          avd-name: ${{ env.AVD_NAME }}
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -accel off
            -netdelay none
            -netspeed full
            -verbose
          script: |
            echo "✅ Emulator is fully booted!"
            adb shell getprop ro.build.version.sdk

      - name: Install Node.js (for ws-scrcpy)
        run: |
          brew install node@20
          echo "$(brew --prefix node@20)/bin" >> $GITHUB_PATH

      - name: Clone & build ws-scrcpy
        run: |
          git clone https://github.com/NetrisTV/ws-scrcpy.git
          cd ws-scrcpy
          npm install

      - name: Download Cloudflared (ARM64)
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-arm64 -o cloudflared
          chmod +x cloudflared

      - name: Start Cloudflare Tunnel + ws-scrcpy
        run: |
          nohup ./cloudflared tunnel --url http://localhost:8000 > tunnel.log 2>&1 &
          sleep 5
          TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' tunnel.log | head -1)
          for i in {1..10}; do
            [ -n "$TUNNEL_URL" ] && break
            sleep 5
            TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' tunnel.log | head -1)
          done
          echo "🌐 Access your Android here: $TUNNEL_URL"
          echo "Access URL: $TUNNEL_URL" >> $GITHUB_STEP_SUMMARY
          cd ws-scrcpy
          npm start
