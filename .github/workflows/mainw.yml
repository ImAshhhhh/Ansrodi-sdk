name: Run Cloudflared SSH Tunnel

on:
  workflow_dispatch:  # Manual trigger
  push:              # Or trigger on push
  schedule:          # Or scheduled (cron)
    - cron: '0 */6 * * *'  # Every 6 hours

jobs:
  tunnel:
    runs-on: ubuntu-24.04-arm  # Linux ARM64 runner
    steps:
      - name: Install cloudflared
        run: |
          # Download cloudflared for ARM64
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64
          chmod +x cloudflared-linux-arm64
          sudo mv cloudflared-linux-arm64 /usr/local/bin/cloudflared
          
          # Verify installation
          cloudflared --version

      - name: Setup SSH server with user ash
        run: |
          # Install and start SSH server
          sudo apt update
          sudo apt install -y openssh-server
          sudo systemctl start ssh
          sudo systemctl enable ssh
          
          # Create user 'ash' with home directory
          sudo useradd -m -s /bin/bash ash
          
          # Set password for user 'ash' to 'root'
          echo 'ash:root' | sudo chpasswd
          
          # Add user to sudo group (optional)
          sudo usermod -aG sudo ash
          
          # Ensure SSH allows password authentication
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          
          # Restart SSH to apply changes
          sudo systemctl restart ssh
          
          # Verify SSH is running
          sudo systemctl status ssh --no-pager
          
          echo "SSH user 'ash' created with password 'root'"

      - name: Create tunnel service with token
        run: |
          # Install the service with your token
          sudo cloudflared service install eyJhIjoiY2U5MWFiYmQyYWU3YjhlZjQxMmU0YWQxODJmYzUxYzciLCJ0IjoiMzYwNDk1MzYtMGQzYS00MjQ0LWEyMDQtODBkYjM4ODRmZjIzIiwicyI6Ik56UXdPREptWkdVdE9HTXhNeTAwTVRkbUxXRTBOamd0TURnMVpUSXpNV0V5TlRBeCJ9
          
          # Enable and start the service
          sudo systemctl enable cloudflared
          sudo systemctl start cloudflared
          
          # Check status
          sleep 3
          sudo systemctl status cloudflared --no-pager

      - name: Keep tunnel alive
        run: |
          echo "========================================="
          echo "SSH Tunnel is running!"
          echo "Connect with: ssh ash@sshh.iamash.qzz.io"
          echo "Password: root"
          echo "========================================="
          echo ""
          echo "Showing recent logs:"
          sudo journalctl -u cloudflared --no-pager -n 20
          
          # Keep the workflow running (GitHub limits: max 6 hours)
          sleep 6h
